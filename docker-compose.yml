services:
  db:
    image: postgres:16-alpine
    container_name: credentia-postgres
    environment:
      POSTGRES_DB: credentia
      POSTGRES_USER: credentia
      POSTGRES_PASSWORD: credentia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credentia -d credentia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

